services:
  - type: web
    name: deployflow-api
    env: node
    plan: free
    buildCommand: npm install && npm run build -w api
    startCommand: npx prisma migrate deploy && npx prisma db seed && npm run start -w api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: deployflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: deployflow-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_MASTER_KEY
        generateValue: true

  - type: web
    name: deployflow-web
    env: node
    plan: free
    buildCommand: npm install && npm run build -w web
    startCommand: npm run start -w web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: deployflow-api
          type: web
          property: host

  - type: redis
    name: deployflow-redis
    plan: free
    ipAllowList: []

databases:
  - name: deployflow-db
    plan: free
