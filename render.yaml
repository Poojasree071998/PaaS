services:
  - type: web
    name: deployflow-api
    env: node
    plan: free
    buildCommand: npm install && npm run build -w api
    startCommand: npm run start -w api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: deployflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: deployflow-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_MASTER_KEY
        generateValue: true

  - type: redis
    name: deployflow-redis
    plan: free
    ipAllowList: [] # Allow connections from all services in this blueprint

databases:
  - name: deployflow-db
    plan: free
